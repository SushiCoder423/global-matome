name: Auto Update from Reddit

on:
  schedule:
    # 毎日 UTC 0:00 (日本時間 9:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Fetch Reddit posts
        run: |
          cd scripts
          python auto_fetch_reddit.py
      
      - name: Check if content was fetched
        run: |
          if [ -f "scripts/reddit_content.json" ]; then
            echo "✅ Reddit content fetched successfully"
            cat scripts/reddit_content.json | head -20
          else
            echo "❌ Failed to fetch Reddit content"
            exit 1
          fi
      
      - name: List files for debugging
        run: |
          echo "Current directory:"
          pwd
          echo "Files in current directory:"
          ls -la
          echo "Files in scripts directory:"
          ls -la scripts/
      
      - name: Update index.html (simple version)
        run: |
          echo "Skipping HTML update for now - just testing Reddit fetch"
          echo "Content fetched successfully!"
      
      - name: Commit results (optional)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add scripts/reddit_content.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Fetched Reddit data $(date +'%Y-%m-%d')" && git push) || echo "No changes to commit"
